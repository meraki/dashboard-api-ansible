- name: Play Name
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Get SAML IdPs
      cisco.meraki.organizations_saml_idps_info:
        meraki_suppress_logging: true
        organizationId: "828099381482762270"
      register: result

    - name: Show IdPs
      ansible.builtin.debug:
        msg: "{{ result }}"
