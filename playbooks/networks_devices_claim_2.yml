- name: Play Name
  hosts: localhost
  vars:
    network_id: L_828099381482771185
    serial_number: QBSB-D5ZD-9CXT
  gather_facts: false
  tasks:
    - name: Get network devices
      cisco.meraki.networks_devices_info:
        networkId: "{{ network_id }}"
      register: result

    - name: Show devices
      ansible.builtin.debug:
        msg: "{{ result }}"
